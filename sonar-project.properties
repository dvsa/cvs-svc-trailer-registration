#----- Default SonarQube server
# https://docs.sonarqube.org/latest/analysis/generic-test/

# TODO: https://www.npmjs.com/package/jest-sonar-reporter
# TODO: https://docs.sonarqube.org/latest/analysis/languages/javascript/
# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

sonar.host.url=http://localhost:9000

# must be unique in a given SonarQube instance
sonar.projectKey=org.sonarqube:cvs-svc-trailer-registration

# this is the name and version displayed in the SonarQube UI. Was mandatory prior to SonarQube 6.1.
sonar.projectName=cvs-svc-trailer-registration
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# This property is optional if sonar.modules is set.
sonar.sources=src
sonar.exclusions=**/node_modules/**, **/*.int.ts, **/coverage/**, **/local/**, **/.vscode/**, **/.serverless/**, **/.webpack/**, **/build/**
sonar.test.inclusions=**/*.test.ts
sonar.typescript.lcov.reportPaths=coverage/unit/lcov.info
